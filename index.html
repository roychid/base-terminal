<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>me@roychid — listening…</title>
<link href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  height: 100dvh;
  background-color: #02360a;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Ubuntu Mono', monospace;
  touch-action: manipulation;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}

.terminal {
  width: min(720px, 96vw);
  height: min(520px, 80dvh);
  border-radius: clamp(8px, 2vw, 16px);
  overflow: hidden;
  backdrop-filter: blur(14px);
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.25);
  box-shadow: 0 20px 50px rgba(0,0,0,0.45);
  display: flex;
  flex-direction: column;
}

.titlebar {
  height: 30px;
  background: rgba(40,40,40,0.55);
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 12px;
  color: #ccc;
  font-size: clamp(0.65rem, 2vw, 0.85rem);
  flex-shrink: 0;
  user-select: none;
}

.dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.red    { background: #ff5f56; }
.yellow { background: #ffbd2e; }
.green  { background: #27c93f; }

.content {
  flex: 1;
  position: relative;
  overflow: hidden;
  cursor: pointer;
}

canvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
}

.terminal-text {
  position: absolute;
  bottom: 18px;
  left: 18px;
  color: #7fffd4;
  font-size: clamp(0.7rem, 2.2vw, 1rem);
  white-space: pre;
  z-index: 2;
  pointer-events: none;
}

.cursor {
  display: inline-block;
  width: clamp(5px, 1.5vw, 8px);
  background: #7fffd4;
  margin-left: 3px;
  animation: blink 1s infinite;
}

@keyframes blink { 50% { opacity: 0; } }

.tap-hint {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: rgba(127,255,212,0.5);
  font-family: 'Ubuntu Mono', monospace;
  font-size: clamp(0.75rem, 2.5vw, 0.9rem);
  text-align: center;
  pointer-events: none;
  transition: opacity 0.6s;
  z-index: 3;
  line-height: 2;
  white-space: nowrap;
}
.tap-hint.hidden { opacity: 0; }
</style>
</head>
<body>

<div class="terminal">
  <div class="titlebar">
    <div class="dot red"></div>
    <div class="dot yellow"></div>
    <div class="dot green"></div>
    me@roychid — listening…
  </div>
  <div class="content" id="content">
    <canvas id="canvas"></canvas>
    <div class="terminal-text" id="terminalText"></div>
    <div class="tap-hint" id="hint">▶ tap to play</div>
  </div>
</div>

<script>
/* ---------- COLORS ---------- */
const colors = ["#ff00ff", "#02360b", "#02360a"];

/* ---------- CANVAS ---------- */
const canvas = document.getElementById("canvas");
const ctx    = canvas.getContext("2d");
const hint   = document.getElementById("hint");

function resize() {
  canvas.width  = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
}
window.addEventListener("resize", resize);
resize();

/* ---------- AUDIO SETUP ---------- */
let audioCtx, analyser, freqData, audio;
let started = false;

function setupAudio() {
  audio = new Audio();
  audio.src = "song.mp3";
  audio.crossOrigin = "anonymous";

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const source = audioCtx.createMediaElementSource(audio);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 1024;
  source.connect(analyser);
  analyser.connect(audioCtx.destination);
  freqData = new Uint8Array(analyser.frequencyBinCount);
}

/* ---------- VARIABLES ---------- */
let t = 0;
const waves = [];
let bassSmoothed = 0, midSmoothed = 0, trebleSmoothed = 0;

/* ---------- UTILITY ---------- */
const lerp = (a, b, f) => a + (b - a) * f;

/* ---------- ANIMATE ---------- */
function animate() {
  requestAnimationFrame(animate);

  if (analyser) analyser.getByteFrequencyData(freqData);

  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  t += 0.02;

  const bass   = freqData ? freqData.slice(0, 8).reduce((a,b) => a+b, 0) / 8    : 0;
  const mid    = freqData ? freqData.slice(8, 64).reduce((a,b) => a+b, 0) / 56  : 0;
  const treble = freqData ? freqData.slice(64, 256).reduce((a,b) => a+b, 0) / 192 : 0;

  bassSmoothed   = lerp(bassSmoothed, bass, 0.2);
  midSmoothed    = lerp(midSmoothed, mid, 0.2);
  trebleSmoothed = lerp(trebleSmoothed, treble, 0.2);

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  /* CORE PULSE */
  const coreRadius = 25 + bassSmoothed * 0.6 + Math.sin(t * 6) * 3;
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, coreRadius);
  grad.addColorStop(0, colors[0]);
  grad.addColorStop(1, "rgba(0,255,255,0)");
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(cx, cy, coreRadius, 0, Math.PI * 2);
  ctx.fill();

  /* WAVES */
  waves.push({ radius: coreRadius, alpha: 0.5 });
  for (let i = waves.length - 1; i >= 0; i--) {
    const w = waves[i];
    w.radius += 4 + bassSmoothed * 0.05;
    w.alpha  -= 0.015;
    if (w.alpha <= 0) { waves.splice(i, 1); continue; }
    ctx.strokeStyle = `rgba(176,255,255,${w.alpha})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx, cy, w.radius, 0, Math.PI * 2);
    ctx.stroke();
  }

  /* RADIAL LINES */
  const lineCount = 20;
  for (let i = 0; i < lineCount; i++) {
    const angle  = t + (i / lineCount) * Math.PI * 2;
    const length = 50 + midSmoothed * 0.7;
    ctx.strokeStyle = colors[1];
    ctx.lineWidth   = 1 + trebleSmoothed * 0.02;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(angle) * length, cy + Math.sin(angle) * length);
    ctx.stroke();
  }

  /* ROTATING ARC RINGS */
  for (let r = 0; r < 3; r++) {
    const radius   = 90 + r * 22 + trebleSmoothed * 0.4;
    const segments = 6 + r * 2;
    const rotation = t * (0.6 + r * 0.2);
    ctx.lineWidth   = 2;
    ctx.strokeStyle = colors[2];
    for (let i = 0; i < segments; i++) {
      const start = rotation + (i / segments) * Math.PI * 2;
      const end   = start + Math.PI / segments * 0.6;
      ctx.beginPath();
      ctx.arc(cx, cy, radius, start, end);
      ctx.stroke();
    }
  }

  /* TERMINAL FLASH */
  terminalText.style.color = bassSmoothed > 150 ? colors[1] : "#7fffd4";
}

/* ---------- TERMINAL TYPING ---------- */
const lines = [
  "me@reality ~$ listening to the drop",
  "me@reality ~$ focus on the vibe",
  "me@reality ~$ let the bass hit",
  "me@reality ~$ stay in the moment",
  "me@reality ~$ your coffee is judging you",
  "me@reality ~$ cats are secretly DJs",
  "me@reality ~$ coding in the bass zone",
  "me@reality ~$ someone just said 'wow' somewhere",
  "me@reality ~$ warning: happiness overload",
  "me@reality ~$ do a dance, physics be damned"
];

const terminalText = document.getElementById("terminalText");
let lineIndex = 0, charIndex = 0;

function type() {
  if (lineIndex >= lines.length) {
    setTimeout(() => {
      terminalText.innerHTML = "";
      lineIndex = 0; charIndex = 0;
      type();
    }, 2000);
    return;
  }
  const current = lines[lineIndex];
  terminalText.innerHTML = current.slice(0, charIndex) + "<span class='cursor'></span>";
  charIndex++;
  if (charIndex > current.length) {
    charIndex = 0; lineIndex++;
    setTimeout(type, 600);
  } else {
    setTimeout(type, 35);
  }
}

/* ---------- START ON GESTURE ---------- */
function start() {
  if (started) return;
  started = true;
  setupAudio();          // AudioContext created inside user gesture — works on iOS
  audioCtx.resume();
  audio.play().catch(() => {});
  hint.classList.add("hidden");
}

document.getElementById("content").addEventListener("click", start);
document.getElementById("content").addEventListener("touchend", e => {
  e.preventDefault();
  start();
});

/* ---------- KICK OFF ---------- */
animate();
type();
</script>

</body>
</html>
